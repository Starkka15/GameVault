# Per-game Proton/Wine environment quirks for EA games, applied by ea-launcher.sh
# AFTER the standard RUNTIMES_* -> PROTON_* mapping and any UI ADVANCED_VARIABLES,
# so these win. For games that need a specific Proton knob to run stably that the
# generic settings don't cover.
#
# Format (one game per line):
#     <slug>=<space-separated VAR=VALUE assignments>
#
# The <slug> is the game's ea.py ShortName (e.g. "mirrors-edge-catalyst"). Lines
# starting with # are comments. Values must not contain spaces (one token each).
# Meant to be extended by anyone: if a game only runs with a certain env var, add
# it here rather than patching the launcher.
#
# --- Mirror's Edge Catalyst: ~20s freeze on non-Nvidia GPUs (nvapi) --------
# Root cause (per Valve's Proton Experimental changelog, 2026-06-10): Catalyst
# freezes on systems WITHOUT an Nvidia GPU "due to nvapi presence" — it detects
# nvapi (which GE-Proton ships ENABLED by default for DLSS), takes an Nvidia-only
# path, finds no Nvidia GPU (the Ally is AMD) and deadlocks a few seconds after
# reaching gameplay. Valve patched Proton Experimental; on GE-Proton the per-game
# fix is to turn nvapi off so the game never detects it. (Ruled out along the
# way: esync/fsync, CPU topology, VRAM, LSX — all red herrings.)
mirrors-edge-catalyst=PROTON_DISABLE_NVAPI=1
