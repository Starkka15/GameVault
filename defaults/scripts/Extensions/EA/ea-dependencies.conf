# Per-game runtime dependencies for EA games, installed into the maxima Proton
# prefix via winetricks. These are libraries some games need that Proton does
# NOT provide and the game's own EA installer does NOT bundle.
#
# Format (one game per line):
#     <slug>=<space-separated winetricks verbs>
#
# The <slug> is the game's ea.py ShortName (what you see from
# `maxima-cli list-games`, e.g. "mass-effect-2"). Lines starting with # are
# comments. This file is meant to be extended by anyone — if a game fails to
# launch complaining about a missing runtime, add its winetricks verb(s) here.
#
# Common verbs:  physx  (NVIDIA PhysX System Software, legacy)
#                dotnet40 dotnet48  (.NET Framework)
#                vcrun2005 vcrun2010 vcrun2012 vcrun2013 vcrun2019  (VC++ runtimes)
#                d3dcompiler_43 d3dcompiler_47  (D3DCompiler)
#                xact  (XAudio/XACT)
#
# --- PhysX (legacy NVIDIA System Software) ---------------------------------
# Older PhysX-based games abort with "Failed to initialize the physics system,
# Please ensure you have an updated version of the PhysX System Software
# Installed" without it. Verified needed: Mass Effect 2.
mass-effect-2=physx
mass-effect-3=physx
mirrors-edge=physx
